name: Build, Test & Release Android APK

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Run linter
        run: ./gradlew lint

      - name: Run unit tests
        run: ./gradlew test

      - name: Build debug APK
        run: ./gradlew assembleDebug

  build-release:
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Extract version and changelog
        id: version
        run: |
          # Extract version from app/build.gradle.kts
          VERSION=$(grep -oP '(?<=versionName = ").*?(?=")' app/build.gradle.kts | head -1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          
          # Extract latest changelog entry (everything between first two ## [version])
          CHANGELOG=$(awk '/^## \[/{if(++count==2) exit} NR>1' CHANGELOG.md)
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
          if [ -z "$VERSION" ]; then
            echo "Error: Could not extract version from app/build.gradle.kts"
            exit 1
          fi
          echo "✅ Extracted version: $VERSION"

      - name: Create keystore file
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 -d > keystore.jks
          if [ ! -f keystore.jks ]; then
            echo "Error: Failed to create keystore"
            exit 1
          fi
          echo "✅ Keystore created successfully"

      - name: Build signed release APK
        run: |
          ./gradlew clean assembleRelease
        env:
          SIGNING_STORE_FILE: ${{ github.workspace }}/keystore.jks
          SIGNING_STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Find and verify APK
        id: apk
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" -type f | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "Error: APK not found after build!"
            exit 1
          fi
          APK_NAME=$(basename "$APK_PATH")
          APK_SIZE=$(du -h "$APK_PATH" | cut -f1)
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "apk_name=$APK_NAME" >> $GITHUB_OUTPUT
          echo "✅ APK found: $APK_NAME ($APK_SIZE)"

      - name: Cleanup sensitive files
        if: always()
        run: |
          rm -f app/keystore.jks
          echo "✅ Keystore cleaned up"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: success()
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body: |
            # Mobile Intelligence v${{ steps.version.outputs.version }}
            
            **Release Notes:**
            
            ${{ steps.version.outputs.changelog }}
            
            ---
            
            **Author:** Shravan Jeripothula
            **Contact:** jerryshravan@gmail.com
            **Instagram:** @jerryhaxor
            **Twitter/X:** @jerryhaxor
          files: |
            ${{ steps.apk.outputs.apk_path }}
          draft: false
          prerelease: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK to artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: signed-apk-${{ steps.version.outputs.version }}
          path: ${{ steps.apk.outputs.apk_path }}
          retention-days: 30

      - name: Build completion notification
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Build and release completed successfully!"
            echo "📦 APK: ${{ steps.apk.outputs.apk_name }}"
            echo "🏷️  Version: v${{ steps.version.outputs.version }}"
            echo "🔗 Release: https://github.com/${{ github.repository }}/releases/tag/v${{ steps.version.outputs.version }}"
          else
            echo "❌ Build or release failed!"
          fi
