name: Build and Release Signed APK

on:
  push:
    branches:
      - master
    paths-ignore:
      - 'README.md'
      - 'CHANGELOG.md'
      - 'LICENSE'
      - '.gitignore'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Extract version and changelog
        id: version
        run: |
          # Extract version from app/build.gradle.kts
          VERSION=$(grep -oP '(?<=versionName = ").*?(?=")' app/build.gradle.kts | head -1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          
          # Extract latest changelog entry (everything between first two ## [version])
          CHANGELOG=$(awk '/^## \[/{if(++count==2) exit} NR>1' CHANGELOG.md)
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create keystore file
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 -d > keystore.jks
          ls -la keystore.jks

      - name: Build signed APK
        run: |
          # Make sure gradlew exists and is executable
          if [ ! -f "gradlew" ]; then
            echo "Error: gradlew script not found in repository root"
            exit 1
          fi
          chmod +x gradlew
          ./gradlew clean assembleRelease \
            -Pandroid.injected.signing.store.file=keystore.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: Find APK file
        id: apk
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" -type f | head -1)
          APK_NAME=$(basename "$APK_PATH")
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "apk_name=$APK_NAME" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: success()
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body: |
            # Mobile Intelligence v${{ steps.version.outputs.version }}
            
            **Release Notes:**
            
            ${{ steps.version.outputs.changelog }}
            
            ---
            
            **Author:** Shravan Jeripothula
            **Contact:** jerryshravan@gmail.com
            **Instagram:** @jerryhaxor
            **Twitter/X:** @jerryhaxor
          files: |
            ${{ steps.apk.outputs.apk_path }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK to artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: signed-apk
          path: ${{ steps.apk.outputs.apk_path }}
          retention-days: 30

      - name: Build status notification
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Build and release completed successfully!"
            echo "📦 APK: ${{ steps.apk.outputs.apk_name }}"
            echo "🏷️  Version: v${{ steps.version.outputs.version }}"
          else
            echo "❌ Build failed!"
          fi
