name: Bug report
description: Report a reproducible defect
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug.
        For security vulnerabilities, do not open a public issue. See SECURITY.md.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: A concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide a minimal, reliable sequence.
      placeholder: |
        1. Open ...
        2. Tap ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: app_version
    attributes:
      label: App version
      placeholder: 1.0.0
    validations:
      required: true
  - type: input
    id: android_version
    attributes:
      label: Android version
      placeholder: Android 14
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Device model
      placeholder: Pixel 8
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Remove personal/sensitive data before posting.
